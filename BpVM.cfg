// BpVM.cfg — config de la VM para este checkout del repo.
// Ver `docs/BpVM.cfg.example` para la versión anotada con todas las opciones.
//
// Todos los campos son opcionales — el comentario tras cada uno indica el
// default cuando se omite. Ajusta los valores y los comentarios si cambias
// la configuración del proyecto.
{
  // Bytes totales del array `memory` de la VM. Contiene data block,
  // heap y stacks. Aumenta si tu programa alloca mucho.
  // Default: 524288 (512 KiB).
  "memorySize": 524288,

  // Offset donde termina el heap y empiezan los stacks. Validaciones:
  //   stackBase < memorySize y cabe al menos el main stack.
  // Default: memorySize / 2.
  "stackBase": 262144,

  // Directorio donde la VM busca los .mod stdlib (Json.mod, etc.) cuando
  // un `import` no resuelve desde el cwd. Usa "/" como separador para
  // que Windows y Unix lo acepten.
  // Default: null (sin fallback stdlib).
  "stdlibDir": "C:/lenguajes/pm/bpstdlib"
}
